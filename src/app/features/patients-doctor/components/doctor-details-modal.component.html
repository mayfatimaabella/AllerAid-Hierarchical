<ng-container>
  <div class="doctor-modal-backdrop" (click)="close()">
    <div class="doctor-modal-content" (click)="$event.stopPropagation()">
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="end">
            <ion-button (click)="close()">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
          <ion-title>Doctor Details</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <div class="doctor-details">
          <div class="doctor-avatar"> 
            <ion-icon name="person-circle"></ion-icon>
          </div>

          <h2>{{ doctor?.doctorName || 'Unknown Doctor' }}</h2>

          <div *ngIf="doctor?.specialization" class="detail-item">
            <ion-label>Specialization</ion-label>
            <p>{{ doctor.specialization }}</p>
          </div>

          <div *ngIf="doctor?.doctorEmail" class="detail-item">
            <ion-label>Email</ion-label>
            <p>{{ doctor.doctorEmail }}</p>
          </div>

          <div *ngIf="doctor?.acceptedAt" class="detail-item">
            <ion-label>Added On</ion-label>
            <p>{{ doctor.acceptedAt | date:'short' }}</p>
          </div>

          <div *ngIf="doctor?.relationship" class="detail-item">
            <ion-label>Relationship</ion-label>
            <p>{{ doctor.relationship }}</p>
          </div>
        </div>
      </ion-content>
    </div>
  </div>
</ng-container>
