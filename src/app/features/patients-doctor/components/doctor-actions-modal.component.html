<ng-container>
  <div class="doctor-modal-backdrop" (click)="close()">
    <div class="doctor-modal-content" (click)="$event.stopPropagation()">
        <ion-list>
          <ion-item button (click)="deleteDoctor()">
            <ion-icon name="trash-outline" slot="start" color="danger"></ion-icon>
            <ion-label color="danger">Remove Doctor</ion-label>
          </ion-item>
        </ion-list>
    </div>
  </div>
</ng-container>
