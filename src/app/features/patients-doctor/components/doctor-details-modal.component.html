<ng-container>
  <div class="doctor-modal-backdrop" (click)="close()">
    <div class="doctor-modal-content" (click)="$event.stopPropagation()">
      <ion-header class="modal-header">
        <ion-toolbar>
          <ion-title class="modal-title">Doctor Details</ion-title>
          <ion-buttons slot="end">
            <ion-button fill="clear" (click)="close()" class="close-btn">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding details-content">
        <div class="doctor-details">
          <div class="doctor-avatar-section">
            <div class="doctor-avatar">
              <ion-icon name="person-circle-outline"></ion-icon>
            </div>
          </div>

          <h2 class="doctor-name">{{ doctor?.doctorName || 'Unknown Doctor' }}</h2>

          <div class="details-grid">
            <div *ngIf="doctor?.specialization" class="detail-item">
              <ion-icon name="briefcase-outline" class="detail-icon"></ion-icon>
              <div class="detail-content">
                <span class="detail-label">Specialization</span>
                <p class="detail-value">{{ doctor.specialization }}</p>
              </div>
            </div>

            <div *ngIf="doctor?.doctorEmail" class="detail-item">
              <ion-icon name="mail-outline" class="detail-icon"></ion-icon>
              <div class="detail-content">
                <span class="detail-label">Email</span>
                <p class="detail-value">{{ doctor.doctorEmail }}</p>
              </div>
            </div>

            <div *ngIf="doctor?.phoneNumber" class="detail-item">
              <ion-icon name="call-outline" class="detail-icon"></ion-icon>
              <div class="detail-content">
                <span class="detail-label">Phone</span>
                <p class="detail-value">{{ doctor.phoneNumber }}</p>
              </div>
            </div>

            <div *ngIf="doctor?.acceptedAt" class="detail-item">
              <ion-icon name="calendar-outline" class="detail-icon"></ion-icon>
              <div class="detail-content">
                <span class="detail-label">Connected Since</span>
                <p class="detail-value">{{ convertTimestamp(doctor.acceptedAt) | date:'short' }}</p>
              </div>
            </div>
          </div>
        </div>
      </ion-content>
    </div>
  </div>
</ng-container>
