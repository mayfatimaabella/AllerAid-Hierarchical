<div class="section-title">
  Medications
</div>

<div class="medications-list">
  <ng-container *ngIf="!isLoading">
    <div *ngFor="let medication of recentMedications; trackBy: trackByMedication" 
      class="medication-card" 
      [ngClass]="{ 
        'emergency-medication': isEmergencyMedication(medication),
        'finished-medication': getStatusLabel(medication) === 'Completed' || getStatusLabel(medication) === 'Inactive'
      }"
      (click)="viewDetails.emit(medication)"
      style="cursor: pointer;">
          
      <div class="medication-header">
        <div class="medication-title-section">
          <span class="medication-title">{{ medication.name }}</span>
          
          <div class="medication-summary">
             <span class="dosage">{{ medication.dosage }}</span>
             <span class="frequency" *ngIf="medication.frequency"> • {{ medication.frequency }}</span>
             
             <span class="pills" *ngIf="medication.quantity !== undefined"> 
               • {{ calculateRemainingPills(medication) | number:'1.0-0' }} {{ getUnitLabel(medication) }} left
             </span>
          </div>

          <div *ngIf="getLowStockWarning(medication) && calculateRemainingPills(medication) > 0" class="low-stock-text">
            <ion-icon name="alert-circle-outline" color="warning"></ion-icon>
            <small>{{ getLowStockWarning(medication) }}</small>
          </div>
        </div>

        <div class="medication-actions">
          <ion-chip [color]="getStatusColor(medication)" size="small">
            <ion-label>{{ getStatusLabel(medication) }}</ion-label>
          </ion-chip>
        </div>
      </div>
    </div>

    <div *ngIf="!isLoading && recentMedications.length === 0" class="no-medications">
      <div class="no-medications-container">
        <ion-icon name="medical-outline" class="no-medications-icon"></ion-icon>
        <p class="no-medications-text">
          No medications recorded
        </p>
      </div>
    </div>
  </ng-container>
</div>
