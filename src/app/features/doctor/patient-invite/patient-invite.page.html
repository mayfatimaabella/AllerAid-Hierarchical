<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/doctor-dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Patient Invitations</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="ion-padding">
  <h3>Received Invitations</h3>

  <div *ngIf="receivedInvitations.length > 0; else noInvitations">
    <div *ngFor="let invitation of receivedInvitations" class="invitation-card">
      <div class="invitation-header">
        <div class="sender-info">
          <h4>{{ invitation.fromUserName }}</h4>
          <p class="sender-email">{{ invitation.fromUserEmail }}</p>
        </div>

        <ion-chip [color]="getInvitationStatusColor(invitation.status)">
          {{ invitation.status | titlecase }}
        </ion-chip>
      </div>

      <p class="invitation-message" *ngIf="invitation.message">
        "{{ invitation.message }}"
      </p>

      <div class="invitation-date">
        <ion-icon name="time-outline"></ion-icon>
        <small>{{ invitation.createdAt | date:'medium' }}</small>
      </div>

      <div *ngIf="invitation.status === 'pending'" class="invitation-actions">
        <ion-button
          size="small"
          color="success"
          (click)="acceptInvitation(invitation.id!)">
          <ion-icon name="checkmark-outline" slot="start"></ion-icon>
          Accept
        </ion-button>

        <ion-button
          size="small"
          fill="outline"
          color="danger"
          (click)="declineInvitation(invitation.id!)">
          <ion-icon name="close-outline" slot="start"></ion-icon>
          Decline
        </ion-button>
      </div>
    </div>
  </div>

  <ng-template #noInvitations>
    <div class="empty-state">
      <ion-icon name="mail-outline" class="empty-icon"></ion-icon>
      <p style="color: #ececec">No invitations received</p>
    </div>
  </ng-template>
</ion-content>
