<ion-header>
  <ion-toolbar class="toolbar--teal">
    <ion-title>Change Password</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()" fill="clear">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="change-password-container">
    <!-- Current Password Field -->
    <ion-item class="input-item">
      <ion-label position="stacked">Current Password</ion-label>
      <ion-input
        [type]="showCurrentPassword ? 'text' : 'password'"
        [(ngModel)]="currentPassword"
        placeholder="Enter your current password"
        [disabled]="isLoading"
      ></ion-input>
      <ion-button
        (click)="togglePasswordVisibility('current')"
        fill="clear"
        slot="end"
        [disabled]="isLoading"
      >
        <ion-icon [name]="showCurrentPassword ? 'eye-off' : 'eye'"></ion-icon>
      </ion-button>
    </ion-item>

    <!-- New Password Field -->
    <ion-item class="input-item">
      <ion-label position="stacked">New Password</ion-label>
      <ion-input
        [type]="showNewPassword ? 'text' : 'password'"
        [(ngModel)]="newPassword"
        placeholder="Enter your new password"
        [disabled]="isLoading"
      ></ion-input>
      <ion-button
        (click)="togglePasswordVisibility('new')"
        fill="clear"
        slot="end"
        [disabled]="isLoading"
      >
        <ion-icon [name]="showNewPassword ? 'eye-off' : 'eye'"></ion-icon>
      </ion-button>
    </ion-item>

    <!-- Confirm Password Field -->
    <ion-item class="input-item">
      <ion-label position="stacked">Confirm New Password</ion-label>
      <ion-input
        [type]="showConfirmPassword ? 'text' : 'password'"
        [(ngModel)]="confirmPassword"
        placeholder="Confirm your new password"
        [disabled]="isLoading"
      ></ion-input>
      <ion-button
        (click)="togglePasswordVisibility('confirm')"
        fill="clear"
        slot="end"
        [disabled]="isLoading"
      >
        <ion-icon [name]="showConfirmPassword ? 'eye-off' : 'eye'"></ion-icon>
      </ion-button>
    </ion-item>

    <!-- Password Requirements Info -->
    <div class="password-requirements">
      <p>
        <ion-icon name="information-circle-outline"></ion-icon>
        Password must be at least 6 characters long
      </p>
    </div>
  </div>
</ion-content>

<ion-footer>
  <ion-button
    class="primary-action-button"
    expand="block"
    (click)="changePassword()"
    [disabled]="isLoading"
  >
    <span *ngIf="!isLoading">Save Password</span>
    <ion-spinner *ngIf="isLoading" name="circular"></ion-spinner>
  </ion-button>
</ion-footer>
