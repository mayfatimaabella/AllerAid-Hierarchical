<ion-modal 
  #modal
  [isOpen]="isOpen"
  [swipeToClose]="true"
  [breakpoints]="[0, 0.5, 1]"
  [initialBreakpoint]="0.9"
  [handleBehavior]="'cycle'"
  (ionModalDidDismiss)="onDismiss()">

  <ng-template>
    <ion-header class="ion-no-border">
      <ion-toolbar class="modal-toolbar">
      </ion-toolbar>
    </ion-header>

    <ion-content class="white-content">
      <div class="scans-header">
        <h1 class="header-title">Recent Scans</h1>
        <span class="header-subtitle">{{ recentScans.length }} items saved</span>
      </div>

      <div class="scans-container">
        <div *ngIf="recentScans.length > 0">
          <div 
            class="custom-scan-card" 
            *ngFor="let scan of recentScans; let i = index"
            (click)="onScanSelected(scan)">
            
            <div class="card-body">
              <div class="image-box">
                <img [src]="scan.image_url || 'assets/img/placeholder.png'" alt="Product">
                <div class="status-dot" [ngClass]="scan.status"></div>
              </div>

              <div class="info-box">
                <div class="title-row">
                  <h2 class="product-name">{{ scan.product_name }}</h2>
                  <span class="status-label" [ngClass]="scan.status">
                    {{ scan.status | uppercase }}
                  </span>
                </div>
                
                <p class="brand-name">{{ scan.brand }}</p>
                
                <div class="meta-row">
                  <span class="date-text">
                    <ion-icon name="calendar-outline"></ion-icon>
                    {{ scan.date | date:'MMM d, yyyy' }}
                  </span>
                  <span class="time-text">
                    <ion-icon name="time-outline"></ion-icon>
                    {{ scan.date | date:'h:mm a' }}
                  </span>
                </div>
              </div>
            </div>

            <div class="card-actions">
              <button class="delete-icon-btn" (click)="onDeleteScan(i, $event)">
                <ion-icon name="trash-outline"></ion-icon>
              </button>
              <ion-icon name="chevron-forward" class="arrow-icon"></ion-icon>
            </div>
          </div>

          <button class="clear-history-btn" (click)="onClearScans()">
            <ion-icon name="trash-bin-outline"></ion-icon>
            <span>Clear Recent Scans</span>
          </button>
        </div>

        <div *ngIf="recentScans.length === 0" class="empty-state">
          <div class="empty-icon-circle">
            <ion-icon name="barcode-outline"></ion-icon>
          </div>
          <h3>No Scans Found</h3>
          <p>Your history will appear here once you scan a product barcode.</p>
        </div>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
