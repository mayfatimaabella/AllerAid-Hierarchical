<ng-container>
  <div class="doctor-modal-backdrop" (click)="close()">
    <div class="doctor-modal-content" (click)="$event.stopPropagation()">
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="end">
            <ion-button (click)="close()">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
          <ion-title>Edit Doctor</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <ion-item>
          <ion-label position="floating">First Name</ion-label>
          <ion-input [(ngModel)]="editForm.firstName"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Last Name</ion-label>
          <ion-input [(ngModel)]="editForm.lastName"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Specialty</ion-label>
          <ion-input [(ngModel)]="editForm.specialty"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input [(ngModel)]="editForm.email" disabled></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Phone</ion-label>
          <ion-input [(ngModel)]="editForm.phone"></ion-input>
        </ion-item>

        <div class="button-container">
          <ion-button expand="block" color="primary" (click)="saveChanges()" [disabled]="isLoading">
            <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
            {{ isLoading ? 'Saving...' : 'Save Changes' }}
          </ion-button>
          <ion-button expand="block" fill="outline" (click)="close()">Cancel</ion-button>
        </div>
      </ion-content>
    </div>
  </div>
</ng-container>
